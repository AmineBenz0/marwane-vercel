services:
  postgres:
    image: postgres:15-alpine
    container_name: comptabilite_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-comptabilite_db}
      POSTGRES_USER: ${POSTGRES_USER:-comptabilite_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - comptabilite_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-comptabilite_user} -d ${POSTGRES_DB:-comptabilite_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: comptabilite_backend
    environment:
      # Database connection - use service name 'postgres' instead of localhost
      DATABASE_URL: postgresql://${POSTGRES_USER:-comptabilite_user}:${POSTGRES_PASSWORD:-change_me_in_production}@postgres:5432/${POSTGRES_DB:-comptabilite_db}
      POSTGRES_DB: ${POSTGRES_DB:-comptabilite_db}
      POSTGRES_USER: ${POSTGRES_USER:-comptabilite_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      # JWT Configuration
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      # Application Configuration
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-False}
      API_V1_PREFIX: /api/v1
      # CORS Configuration
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      # Rate Limiting
      RATE_LIMIT_PER_MINUTE: 60
      ENABLE_AUTH: ${ENABLE_AUTH:-True}
      ENABLE_RATE_LIMITING: ${ENABLE_RATE_LIMITING:-True}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - comptabilite_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

