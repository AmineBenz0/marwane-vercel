version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: comptabilite_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-comptabilite_db}
      POSTGRES_USER: ${POSTGRES_USER:-comptabilite_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - comptabilite_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-comptabilite_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  comptabilite_network:
    driver: bridge

