[pytest]
# Configuration pytest pour les tests backend

# Répertoires de recherche des tests
testpaths = tests

# Patterns de fichiers de tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Options par défaut
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=0
    --disable-warnings

# Marqueurs personnalisés
markers =
    unit: Tests unitaires
    integration: Tests d'intégration
    slow: Tests lents
    auth: Tests d'authentification
    security: Tests de sécurité

# Configuration asyncio
asyncio_mode = auto

# Options de logging
log_cli = false
log_cli_level = INFO

